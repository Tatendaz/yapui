name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # zero runtime dependencies — no install step, the suite runs against a fake claude binary
      - run: npm test
